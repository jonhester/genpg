name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genpg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/genpg
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install
      - run: vp check
      - run: vp test
      - run: vp pack

  version-bump:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          CHANGED="false"
          BASE="${{ github.event.before }}"

          if [ -n "$BASE" ] && [ "$BASE" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BASE:package.json" 2>/dev/null; then
            BEFORE="$(git show "$BASE:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
            if [ "$BEFORE" != "$VERSION" ]; then
              CHANGED="true"
            fi
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            BEFORE="$(git show HEAD^:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
            if [ "$BEFORE" != "$VERSION" ]; then
              CHANGED="true"
            fi
          else
            CHANGED="true"
          fi

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version changed: $CHANGED ($TAG)"

  tag:
    needs: version-bump
    if: needs.version-bump.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag on version bump
        run: |
          VERSION="${{ needs.version-bump.outputs.tag }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists — no version bump, skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
            echo "Created and pushed tag $VERSION"
          fi

  publish-github-package:
    needs: version-bump
    if: needs.version-bump.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@jonhester"
      - run: vp install
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          PACKAGE="@jonhester/genpg"
          export PACKAGE

          if vp pm view "$PACKAGE@$VERSION" version -- --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "$PACKAGE@$VERSION already exists in GitHub Packages, skipping."
            exit 0
          fi

          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.name = process.env.PACKAGE; pkg.publishConfig = { ...pkg.publishConfig, registry: 'https://npm.pkg.github.com' }; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          vp pack
          vp pm publish -- --registry=https://npm.pkg.github.com --access public --no-git-checks
